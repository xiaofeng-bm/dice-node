version: '3.8'
services:
  nest-app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    depends_on:
      mysql-container:
        condition: service_healthy
    ports:
      - 443:443
    volumes:
      - /ssl:/ssl
    environment:
      - NODE_ENV=production
    networks:
      - common-network
  mysql-container:
    image: mysql:9.0
    volumes:
      - /Users/baimin/mysql-data:/var/lib/mysql
    # ports:
    #   - 3306:3306
    environment:
      MYSQL_DATABASE: dice-game
      MYSQL_ROOT_PASSWORD: 123456
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - common-network
networks:
  common-network:
    driver: bridge
